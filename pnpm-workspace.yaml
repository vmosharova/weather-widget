allowBuilds:
  '@swc/core': true
  esbuild: true
# pnpm 10+ reads overrides from here (the package.json "pnpm" field is ignored).
overrides:
  esbuild: '^0.25.0'
  flatted: '>=3.4.2'
  lodash: '>=4.18.0'
  yaml: '>=2.8.3'
  picomatch: '>=4.0.4'
  # Security patches for transitive deps flagged by `pnpm audit`.
  form-data: '>=4.0.6'
  'brace-expansion@>=5.0.0 <5.0.6': '>=5.0.6'
  '@babel/core@<7.29.1': '>=7.29.1 <8'
